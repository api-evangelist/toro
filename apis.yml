    humanURL: https://horizon360.toro.com/
    properties:
      - url: https://horizon360.toro.com/
        type: Documentation
      - url: openapi/toro-horizon360-openapi.yml
        type: OpenAPI
    description: >-
      Toro Horizon360 is an all-in-one business management software for landscape contractors that enables crew
      scheduling, job tracking, invoicing, payment processing, customer relationship management, and equipment tracking.
      The platform integrates with EVO Payments for secure cloud-based payment processing.
  - aid: toro:intellidash
    name: Toro IntelliDash
    tags:
      - Irrigation
      - Golf
      - Fleet Management
      - Smart Equipment
      - Monitoring
    humanURL: https://www.toro.com/en/product/IntelliDash
    properties:
      - url: https://www.toro.com/en/product/IntelliDash
        type: Documentation
      - url: openapi/toro-intellidash-openapi.yml
        type: OpenAPI
    description: >-
      Toro IntelliDash is an irrigation and fleet management platform for golf course superintendents to monitor,
      manage, track and maintain operations from a single dashboard. It integrates data from Lynx Central Control,
      myTurf Pro, ezLocator, taskTracker, Playbooks, Turf Guard sensors, and IntelliDash Alliance partners.
  - aid: toro:myturf
    name: Toro myTurf
    tags:
      - Equipment
      - Maintenance
      - Fleet
      - Golf
      - Turf Management
    humanURL: https://www.toro.com/en/professional-contractor
    properties:
      - url: https://www.toro.com/en/professional-contractor
        type: Documentation
    description: >-
      Toro myTurf Pro is a web-based equipment management solution for golf courses and sports fields that provides
      fleet tracking, maintenance scheduling, work orders, parts management, and equipment health monitoring.
