description: Toro does not publish a developer rate-limit document for its connected-product surfaces
  (Horizon360, IntelliDash, myTurf). Access to these systems is via the Toro/Horizon360 customer accounts
  and dealer channels rather than a published public API. Rate-limit numbers cannot be reconciled without
  a developer agreement.
sources:
  - https://horizon360.toro.com/
responseCodes:
  throttled: 429
limits:
  - name: Toro connected-product API limits
    scope: account
    metric: varies
    limit: not published; contact Toro / Horizon360 support for developer terms
policies:
  - name: Contact for Developer Access
    description: Public rate-limit documentation is not available. Customers and integrators should request
      developer terms through Horizon360 support or their Toro NSN dealer to obtain limits applicable
      to their account.
