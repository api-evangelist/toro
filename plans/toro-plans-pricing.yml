description: 'Toro''s public, machine-readable pricing covers Horizon360, the landscape contractor business-management
  SaaS, with four tiers (Essential free / Basic / Premium / Unlimited) priced per month with no setup
  fees and free-trial windows. Toro''s other connected-product surfaces (IntelliDash for golf, myTurf
  Pro fleet management) are sold through dealers/Toro NSN and do not publish list pricing; they are not
  represented as separate plans here. Public API access for any of these products is not separately metered
  and developer access terms are not published.'
sources:
  - https://horizon360.toro.com/
