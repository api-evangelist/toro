naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Crews
  description: 'Toro Horizon360 — Crews. 2 operations. Lead operation: List Crews. Self-contained Naftiko capability covering
    one Toro business surface.'
  tags:
  - Toro
  - Crews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-crews
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Crews business capability. Self-contained, no shared references.
    resources:
    - name: crews
      path: /crews
      operations:
      - name: listcrews
        method: GET
        description: List Crews
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcrew
        method: POST
        description: Create Crew
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-crews-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Crews. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/crews
      name: crews
      description: REST surface for crews.
      operations:
      - method: GET
        name: listcrews
        description: List Crews
        call: horizon360-crews.listcrews
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcrew
        description: Create Crew
        call: horizon360-crews.createcrew
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-crews-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Crews. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-crews
      description: List Crews
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-crews.listcrews
      outputParameters:
      - type: object
        mapping: $.
    - name: create-crew
      description: Create Crew
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-crews.createcrew
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
