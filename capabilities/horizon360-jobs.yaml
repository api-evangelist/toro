naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Jobs
  description: 'Toro Horizon360 — Jobs. 4 operations. Lead operation: List Jobs. Self-contained Naftiko capability covering
    one Toro business surface.'
  tags:
  - Toro
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-jobs
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by job status
        - name: customerId
          in: query
          type: string
          description: Filter by customer ID
        - name: startDate
          in: query
          type: string
          description: Filter jobs on or after this date
        - name: endDate
          in: query
          type: string
          description: Filter jobs on or before this date
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
      - name: createjob
        method: POST
        description: Create Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-jobId
      path: /jobs/{jobId}
      operations:
      - name: getjob
        method: GET
        description: Get Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
      - name: updatejob
        method: PUT
        description: Update Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-jobs-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Jobs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: List Jobs
        call: horizon360-jobs.listjobs
        with:
          status: rest.status
          customerId: rest.customerId
          startDate: rest.startDate
          endDate: rest.endDate
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createjob
        description: Create Job
        call: horizon360-jobs.createjob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-jobId.
      operations:
      - method: GET
        name: getjob
        description: Get Job
        call: horizon360-jobs.getjob
        with:
          jobId: rest.jobId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatejob
        description: Update Job
        call: horizon360-jobs.updatejob
        with:
          jobId: rest.jobId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-jobs
      description: List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-jobs.listjobs
      with:
        status: tools.status
        customerId: tools.customerId
        startDate: tools.startDate
        endDate: tools.endDate
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-job
      description: Create Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-jobs.createjob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: Get Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-jobs.getjob
      with:
        jobId: tools.jobId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-job
      description: Update Job
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: horizon360-jobs.updatejob
      with:
        jobId: tools.jobId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
