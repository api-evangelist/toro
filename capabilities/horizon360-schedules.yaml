naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Schedules
  description: 'Toro Horizon360 — Schedules. 2 operations. Lead operation: List Schedules. Self-contained Naftiko capability
    covering one Toro business surface.'
  tags:
  - Toro
  - Schedules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-schedules
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Schedules business capability. Self-contained, no shared references.
    resources:
    - name: schedules
      path: /schedules
      operations:
      - name: listschedules
        method: GET
        description: List Schedules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: startDate
          in: query
          type: string
          description: Start of the date range
          required: true
        - name: endDate
          in: query
          type: string
          description: End of the date range
          required: true
        - name: crewId
          in: query
          type: string
          description: Filter by crew ID
      - name: createscheduleentry
        method: POST
        description: Create Schedule Entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-schedules-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Schedules. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/schedules
      name: schedules
      description: REST surface for schedules.
      operations:
      - method: GET
        name: listschedules
        description: List Schedules
        call: horizon360-schedules.listschedules
        with:
          startDate: rest.startDate
          endDate: rest.endDate
          crewId: rest.crewId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createscheduleentry
        description: Create Schedule Entry
        call: horizon360-schedules.createscheduleentry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-schedules-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Schedules. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-schedules
      description: List Schedules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-schedules.listschedules
      with:
        startDate: tools.startDate
        endDate: tools.endDate
        crewId: tools.crewId
      outputParameters:
      - type: object
        mapping: $.
    - name: create-schedule-entry
      description: Create Schedule Entry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-schedules.createscheduleentry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
