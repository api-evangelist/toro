naftiko: "1.0.0-alpha1"

info:
  label: "Toro IntelliDash"
  description: "Golf course irrigation and fleet management API providing irrigation control, equipment tracking, sensor data, and agronomic reporting for turf management operations."
  tags:
    - Irrigation
    - Golf
    - Fleet Management
    - Sensors
    - Turf Management
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      INTELLIDASH_API_KEY: INTELLIDASH_API_KEY

capability:
  consumes:
    - type: http
      namespace: intellidash
      baseUri: https://api.intellidash.toro.com/v1
      description: "Toro IntelliDash irrigation and fleet management API"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{INTELLIDASH_API_KEY}}"
        placement: header
      resources:
        - name: irrigation-status
          path: /irrigation/status
          description: "Irrigation system status"
          operations:
            - name: get-irrigation-status
              method: GET
              description: "Get current status of all irrigation systems"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: irrigation-zones
          path: /irrigation/zones
          description: "Irrigation zone management"
          operations:
            - name: list-irrigation-zones
              method: GET
              description: "List all irrigation zones"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by zone status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: irrigation-zone
          path: /irrigation/zones/{zoneId}
          description: "Individual zone operations"
          operations:
            - name: get-irrigation-zone
              method: GET
              description: "Get a specific irrigation zone"
              inputParameters:
                - name: zoneId
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: start-zone-irrigation
          path: /irrigation/zones/{zoneId}/start
          description: "Start irrigation for a zone"
          operations:
            - name: start-irrigation
              method: POST
              description: "Start manual irrigation for a zone"
              inputParameters:
                - name: zoneId
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  duration: "{{tools.duration}}"
        - name: stop-zone-irrigation
          path: /irrigation/zones/{zoneId}/stop
          description: "Stop irrigation for a zone"
          operations:
            - name: stop-irrigation
              method: POST
              description: "Stop active irrigation for a zone"
              inputParameters:
                - name: zoneId
                  in: path
                  type: string
                  required: true
                  description: "Zone identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: equipment
          path: /equipment
          description: "Fleet equipment tracking"
          operations:
            - name: list-fleet-equipment
              method: GET
              description: "List all fleet equipment with health data"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by equipment status"
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by equipment type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: equipment-item
          path: /equipment/{equipmentId}
          description: "Individual equipment details"
          operations:
            - name: get-fleet-equipment
              method: GET
              description: "Get equipment health and details"
              inputParameters:
                - name: equipmentId
                  in: path
                  type: string
                  required: true
                  description: "Equipment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: equipment-location
          path: /equipment/{equipmentId}/location
          description: "Equipment GPS location"
          operations:
            - name: get-equipment-location
              method: GET
              description: "Get current GPS location of equipment"
              inputParameters:
                - name: equipmentId
                  in: path
                  type: string
                  required: true
                  description: "Equipment identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sensors
          path: /sensors
          description: "Environmental and soil sensor monitoring"
          operations:
            - name: list-sensors
              method: GET
              description: "List all sensors and latest readings"
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by sensor type"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: sensor-readings
          path: /sensors/{sensorId}/readings
          description: "Historical sensor data"
          operations:
            - name: get-sensor-readings
              method: GET
              description: "Get historical sensor readings"
              inputParameters:
                - name: sensorId
                  in: path
                  type: string
                  required: true
                  description: "Sensor identifier"
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start of the time range"
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "End of the time range"
                - name: interval
                  in: query
                  type: string
                  required: false
                  description: "Data interval (15min, 1hour, 1day)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: water-usage-report
          path: /reports/water-usage
          description: "Water usage reporting"
          operations:
            - name: get-water-usage-report
              method: GET
              description: "Get water usage summary report"
              inputParameters:
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "Start date"
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "End date"
                - name: groupBy
                  in: query
                  type: string
                  required: false
                  description: "Group results by day, week, month, or zone"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: equipment-health-report
          path: /reports/equipment-health
          description: "Equipment health reporting"
          operations:
            - name: get-equipment-health-report
              method: GET
              description: "Get fleet equipment health summary"
              inputParameters:
                - name: asOf
                  in: query
                  type: string
                  required: false
                  description: "Report date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: intellidash-api
      resources:
        - path: /v1/irrigation/status
          name: irrigation-status
          description: "Current irrigation system status"
          operations:
            - method: GET
              name: get-irrigation-status
              description: "Get irrigation status"
              call: "intellidash.get-irrigation-status"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/irrigation/zones
          name: irrigation-zones
          description: "Irrigation zone management"
          operations:
            - method: GET
              name: list-irrigation-zones
              description: "List irrigation zones"
              call: "intellidash.list-irrigation-zones"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/equipment
          name: equipment
          description: "Fleet equipment management"
          operations:
            - method: GET
              name: list-fleet-equipment
              description: "List fleet equipment"
              call: "intellidash.list-fleet-equipment"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sensors
          name: sensors
          description: "Environmental sensors"
          operations:
            - method: GET
              name: list-sensors
              description: "List sensors"
              call: "intellidash.list-sensors"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports/water-usage
          name: water-usage-report
          description: "Water usage report"
          operations:
            - method: GET
              name: get-water-usage-report
              description: "Get water usage report"
              call: "intellidash.get-water-usage-report"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: intellidash-mcp
      transport: http
      tools:
        - name: get-irrigation-status
          description: "Get current status of golf course irrigation systems"
          hints:
            readOnly: true
            idempotent: true
          call: "intellidash.get-irrigation-status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-irrigation-zones
          description: "List all irrigation zones and their current state"
          hints:
            readOnly: true
            openWorld: true
          call: "intellidash.list-irrigation-zones"
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-irrigation
          description: "Start manual irrigation for a specific zone"
          hints:
            readOnly: false
            destructive: false
          call: "intellidash.start-irrigation"
          with:
            zoneId: "tools.zoneId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stop-irrigation
          description: "Stop active irrigation for a specific zone"
          hints:
            readOnly: false
            destructive: false
          call: "intellidash.stop-irrigation"
          with:
            zoneId: "tools.zoneId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-fleet-equipment
          description: "List all golf course fleet equipment with health data"
          hints:
            readOnly: true
            openWorld: true
          call: "intellidash.list-fleet-equipment"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-equipment-location
          description: "Get GPS location of a specific piece of equipment"
          hints:
            readOnly: true
            idempotent: true
          call: "intellidash.get-equipment-location"
          with:
            equipmentId: "tools.equipmentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-sensors
          description: "List environmental and soil sensors with latest readings"
          hints:
            readOnly: true
            openWorld: true
          call: "intellidash.list-sensors"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-sensor-readings
          description: "Get historical readings for a sensor over a time range"
          hints:
            readOnly: true
            idempotent: true
          call: "intellidash.get-sensor-readings"
          with:
            sensorId: "tools.sensorId"
            startDate: "tools.startDate"
            endDate: "tools.endDate"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-water-usage-report
          description: "Get water usage summary for a date range"
          hints:
            readOnly: true
            idempotent: true
          call: "intellidash.get-water-usage-report"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-equipment-health-report
          description: "Get fleet equipment health status report"
          hints:
            readOnly: true
            idempotent: true
          call: "intellidash.get-equipment-health-report"
          outputParameters:
            - type: object
              mapping: "$."
