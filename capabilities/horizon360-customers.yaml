naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Customers
  description: 'Toro Horizon360 — Customers. 5 operations. Lead operation: List Customers. Self-contained Naftiko capability
    covering one Toro business surface.'
  tags:
  - Toro
  - Customers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-customers
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Customers business capability. Self-contained, no shared references.
    resources:
    - name: customers
      path: /customers
      operations:
      - name: listcustomers
        method: GET
        description: List Customers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: limit
          in: query
          type: integer
          description: Number of records per page
        - name: search
          in: query
          type: string
          description: Search customers by name, email, or phone
      - name: createcustomer
        method: POST
        description: Create Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: customers-customerId
      path: /customers/{customerId}
      operations:
      - name: getcustomer
        method: GET
        description: Get Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          description: Unique customer identifier
          required: true
      - name: updatecustomer
        method: PUT
        description: Update Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecustomer
        method: DELETE
        description: Delete Customer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-customers-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Customers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/customers
      name: customers
      description: REST surface for customers.
      operations:
      - method: GET
        name: listcustomers
        description: List Customers
        call: horizon360-customers.listcustomers
        with:
          page: rest.page
          limit: rest.limit
          search: rest.search
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcustomer
        description: Create Customer
        call: horizon360-customers.createcustomer
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customers/{customerid}
      name: customers-customerid
      description: REST surface for customers-customerId.
      operations:
      - method: GET
        name: getcustomer
        description: Get Customer
        call: horizon360-customers.getcustomer
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecustomer
        description: Update Customer
        call: horizon360-customers.updatecustomer
        with:
          customerId: rest.customerId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecustomer
        description: Delete Customer
        call: horizon360-customers.deletecustomer
        with:
          customerId: rest.customerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-customers-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Customers. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-customers
      description: List Customers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-customers.listcustomers
      with:
        page: tools.page
        limit: tools.limit
        search: tools.search
      outputParameters:
      - type: object
        mapping: $.
    - name: create-customer
      description: Create Customer
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-customers.createcustomer
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer
      description: Get Customer
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-customers.getcustomer
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-customer
      description: Update Customer
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: horizon360-customers.updatecustomer
      with:
        customerId: tools.customerId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-customer
      description: Delete Customer
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: horizon360-customers.deletecustomer
      with:
        customerId: tools.customerId
      outputParameters:
      - type: object
        mapping: $.
