naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Payments
  description: 'Toro Horizon360 — Payments. 2 operations. Lead operation: List Payments. Self-contained Naftiko capability
    covering one Toro business surface.'
  tags:
  - Toro
  - Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-payments
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Payments business capability. Self-contained, no shared references.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: listpayments
        method: GET
        description: List Payments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: customerId
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
      - name: processpayment
        method: POST
        description: Process Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-payments-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Payments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: GET
        name: listpayments
        description: List Payments
        call: horizon360-payments.listpayments
        with:
          status: rest.status
          customerId: rest.customerId
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: processpayment
        description: Process Payment
        call: horizon360-payments.processpayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Payments. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-payments
      description: List Payments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-payments.listpayments
      with:
        status: tools.status
        customerId: tools.customerId
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: process-payment
      description: Process Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-payments.processpayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
