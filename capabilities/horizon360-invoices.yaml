naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Invoices
  description: 'Toro Horizon360 — Invoices. 4 operations. Lead operation: List Invoices. Self-contained Naftiko capability
    covering one Toro business surface.'
  tags:
  - Toro
  - Invoices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-invoices
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Invoices business capability. Self-contained, no shared references.
    resources:
    - name: invoices
      path: /invoices
      operations:
      - name: listinvoices
        method: GET
        description: List Invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: customerId
          in: query
          type: string
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
      - name: createinvoice
        method: POST
        description: Create Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: invoices-invoiceId
      path: /invoices/{invoiceId}
      operations:
      - name: getinvoice
        method: GET
        description: Get Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invoiceId
          in: path
          type: string
          required: true
    - name: invoices-invoiceId-send
      path: /invoices/{invoiceId}/send
      operations:
      - name: sendinvoice
        method: POST
        description: Send Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: invoiceId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-invoices-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Invoices. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/invoices
      name: invoices
      description: REST surface for invoices.
      operations:
      - method: GET
        name: listinvoices
        description: List Invoices
        call: horizon360-invoices.listinvoices
        with:
          status: rest.status
          customerId: rest.customerId
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createinvoice
        description: Create Invoice
        call: horizon360-invoices.createinvoice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{invoiceid}
      name: invoices-invoiceid
      description: REST surface for invoices-invoiceId.
      operations:
      - method: GET
        name: getinvoice
        description: Get Invoice
        call: horizon360-invoices.getinvoice
        with:
          invoiceId: rest.invoiceId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{invoiceid}/send
      name: invoices-invoiceid-send
      description: REST surface for invoices-invoiceId-send.
      operations:
      - method: POST
        name: sendinvoice
        description: Send Invoice
        call: horizon360-invoices.sendinvoice
        with:
          invoiceId: rest.invoiceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-invoices-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Invoices. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-invoices
      description: List Invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-invoices.listinvoices
      with:
        status: tools.status
        customerId: tools.customerId
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-invoice
      description: Create Invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-invoices.createinvoice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-invoice
      description: Get Invoice
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-invoices.getinvoice
      with:
        invoiceId: tools.invoiceId
      outputParameters:
      - type: object
        mapping: $.
    - name: send-invoice
      description: Send Invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-invoices.sendinvoice
      with:
        invoiceId: tools.invoiceId
      outputParameters:
      - type: object
        mapping: $.
