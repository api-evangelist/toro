naftiko: 1.0.0-alpha2
info:
  label: Toro Horizon360 — Equipment
  description: 'Toro Horizon360 — Equipment. 3 operations. Lead operation: List Equipment. Self-contained Naftiko capability
    covering one Toro business surface.'
  tags:
  - Toro
  - Equipment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORO_API_KEY: TORO_API_KEY
capability:
  consumes:
  - type: http
    namespace: horizon360-equipment
    baseUri: https://api.horizon360.toro.com/v1
    description: Toro Horizon360 — Equipment business capability. Self-contained, no shared references.
    resources:
    - name: equipment
      path: /equipment
      operations:
      - name: listequipment
        method: GET
        description: List Equipment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
        - name: type
          in: query
          type: string
          description: Filter by equipment type
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
      - name: addequipment
        method: POST
        description: Add Equipment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: equipment-equipmentId
      path: /equipment/{equipmentId}
      operations:
      - name: getequipment
        method: GET
        description: Get Equipment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: equipmentId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.TORO_API_KEY}}'
  exposes:
  - type: rest
    namespace: horizon360-equipment-rest
    port: 8080
    description: REST adapter for Toro Horizon360 — Equipment. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/equipment
      name: equipment
      description: REST surface for equipment.
      operations:
      - method: GET
        name: listequipment
        description: List Equipment
        call: horizon360-equipment.listequipment
        with:
          status: rest.status
          type: rest.type
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addequipment
        description: Add Equipment
        call: horizon360-equipment.addequipment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/equipment/{equipmentid}
      name: equipment-equipmentid
      description: REST surface for equipment-equipmentId.
      operations:
      - method: GET
        name: getequipment
        description: Get Equipment
        call: horizon360-equipment.getequipment
        with:
          equipmentId: rest.equipmentId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: horizon360-equipment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Toro Horizon360 — Equipment. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-equipment
      description: List Equipment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-equipment.listequipment
      with:
        status: tools.status
        type: tools.type
        page: tools.page
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: add-equipment
      description: Add Equipment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: horizon360-equipment.addequipment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-equipment
      description: Get Equipment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horizon360-equipment.getequipment
      with:
        equipmentId: tools.equipmentId
      outputParameters:
      - type: object
        mapping: $.
