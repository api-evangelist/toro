description: 'FOCUS-aligned FinOps for Toro: monthly subscription (tiered by crew size) for the Horizon360
  contractor SaaS, with other connected-product surfaces (IntelliDash, myTurf) sold via dealer channels
  without published list pricing. Cost allocation here is per Horizon360 subscription tier and crew capacity.'
