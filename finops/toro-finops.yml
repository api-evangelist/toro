meters:
  - name: horizon360_subscription_month
    description: One month of a Horizon360 subscription on Essential, Basic, Premium, or Unlimited.
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - account
  - name: horizon360_crew_capacity
    description: Crew-member capacity associated with the active Horizon360 tier (1 / 5 / unlimited).
    unit: seat
    aggregation: max
    dimensions:
      - tier
      - account
  - name: free_trial_days_remaining
    description: Remaining days on a 30- or 60-day Horizon360 free trial.
    unit: day
    aggregation: max
    dimensions:
      - tier
      - account
principles:
  - name: Visibility
    description: Use the Horizon360 account console to see the active tier, billing date, and crew utilization;
      no separate usage API is published.
  - name: Allocation
    description: For multi-business contractors, attribute Horizon360 subscriptions per account/legal
      entity since seats are bound to the account rather than itemized per project.
  - name: Optimization
    description: Right-size by tier — Essential is free for solo operators, Premium covers up to 5 crew
      members, and Unlimited only earns its cost above 5 active crew. Use the 30/60-day free trials before
      committing.
  - name: Accountability
    description: Assign a single Horizon360 account owner per business; review the tier monthly against
      actual crew count and trial expiry.
